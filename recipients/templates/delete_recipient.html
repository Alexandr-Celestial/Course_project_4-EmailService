<div class="modal-header">
    <h5 class="modal-title">Удаление получателя</h5>
    <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"></button>
</div>
<div class="modal-body">
    <form method="post" enctype="multipart/form-data" action="{% url 'recipients:delete_recipient' object.pk %}">
        {% csrf_token %}
        <div class="justify-content-end d-flex">
            <a class="btn-primary cursor-pointer mx-2" href="{% url 'recipients:recipients' %}"> Отмена</a>
            <button class="btn btn-danger cursor-pointer" id="btn_create_message" type="submit"> Удалить</button>
        </div>
    </form>
</div>
