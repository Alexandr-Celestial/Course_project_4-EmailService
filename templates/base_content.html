<!DOCTYPE html>
{% load static %}
<html lang="en" class="layout-menu-fixed layout-compact">
<head>
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"/>

    <title>Сервис рассылок</title>
    <meta name="description" content=""/>

    <link href="{% static 'css/core.css' %}" rel="stylesheet">
    <link href="https://demos.themeselection.com/sneat-bootstrap-html-admin-template/assets/vendor/fonts/iconify-icons.css"
          rel="stylesheet">
    <link href="{% static 'css/background.css' %}" rel="stylesheet">
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'js/menu.js' %}"></script>
</head>

<body>
{% block auth %}
<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
        {% include 'menu.html' %}
        <div class="layout-page">
            {% include 'header.html' %}
            <div class="content-wrapper">
                <div class="container-xxl flex-grow-1 container-p-y">
                    {% block content %}
                    {% endblock content %}
                </div>
                {% include 'footer.html' %}
                <div class="content-backdrop fade"></div>
            </div>
        </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
</div>
<!-- Modal -->


<div class="modal modal-lg fade" id="modal-mail" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document" style="width: fit-content;">
        <div class="modal-content" id="modal-cont">

        </div>
    </div>
</div>

{% endblock auth %}
</body>

</html>
