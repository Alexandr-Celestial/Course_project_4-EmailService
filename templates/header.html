<nav
        class="layout-navbar container-xxl navbar-detached navbar navbar-expand-xl align-items-center bg-navbar-theme"
        id="layout-navbar">
    <div class="layout-menu-toggle navbar-nav align-items-xl-center me-4 me-xl-0 d-xl-none">
        <a class="nav-item nav-link px-0 me-xl-6" href="javascript:void(0)">
            <i class="icon-base bx bx-menu icon-md"></i>
        </a>
    </div>

    <div class="navbar-nav-right d-flex align-items-center justify-content-end" id="navbar-collapse">
        Получатель рассылки
<!--        {% block text_header %}{% endblock %}-->
        <ul class="navbar-nav flex-row align-items-center ms-md-auto">
            {% if not user.is_authenticated %}
            <li class="nav-item lh-1 me-4">
                <a class="cursor-pointer" id="btn_open_auth">Вход</a>
            </li>

            <script>
                $("#btn_open_auth").click(function(){
                    $("#modalCenter").modal('show')
                })
            </script>
            {% else %}
            <!-- User -->
            <li class="nav-item navbar-dropdown dropdown-user dropdown">
                <a
                        class="nav-link dropdown-toggle hide-arrow p-0"
                        href="javascript:void(0);"
                        data-bs-toggle="dropdown">
                    <div class="">
                        <h6 class="mb-0">{{ user.email }}</h6>
                        <small class="text-body-secondary">
                            {% if user.is_superuser %}
                            Администратор
                            {% endif %}
                        </small>
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <div class="dropdown-divider my-1"></div>
                    </li>
                    <li>
                        <form method="post" action="{% url 'user:logout' %}">
                            {% csrf_token %}
                            <button class="dropdown-item cursor-pointer" type="submit">
                                <i class="icon-base bx bx-log-out icon-md me-3"></i><span>Выход</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </li>
            {% endif %}
            <!--/ User -->
        </ul>
    </div>
</nav>
