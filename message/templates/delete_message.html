<div class="modal-header">
    <h5 class="modal-title">Удаление сообщения</h5>
    <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"></button>
</div>
<div class="modal-body">
    <form method="post" enctype="multipart/form-data" action="{% url 'message:delete_message' object.pk %}">
        {% csrf_token %}
        <div class="justify-content-end d-flex">
            <a class="btn-primary cursor-pointer mx-2" href="{% url 'message:message' %}"> Отмена</a>
            <button class="btn btn-danger cursor-pointer" type="submit"> Удалить</button>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">
        Отмена
    </button>
    <button type="button" class="btn btn-primary">Save changes</button>
</div>
